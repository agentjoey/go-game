<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棋谱回放 - 围棋学堂</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航 -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">⚪ 围棋学堂</a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/play">对弈</a>
                <a href="/tsumego">死活题</a>
                <a href="/records" class="active">棋谱</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="page-header">
            <h1>📖 棋谱回放</h1>
            <p class="text-muted">回顾精彩对局，学习每一步棋</p>
        </div>

        <div class="game-layout">
            <!-- 左侧：对局列表 -->
            <div class="moves-panel">
                <div class="panel-header">
                    <h5>📚 对局记录</h5>
                </div>
                <div id="gameList" class="moves-list">
                    <!-- 对局列表由 JS 渲染 -->
                </div>
            </div>

            <!-- 中间：棋盘 -->
            <div class="board-area">
                <div class="board-info">
                    <span class="current-player">
                        <span id="gameInfo">选择一局棋谱</span>
                    </span>
                    <span class="captures">
                        第 <span id="moveNumber">0</span> 手
                    </span>
                </div>
                <div class="board-container">
                    <div class="board-wrapper">
                        <div id="replay-board" class="go-board"></div>
                    </div>
                </div>
                <div class="board-controls">
                    <button class="btn btn-outline-secondary btn-sm" onclick="goToStart()">⏮</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="prevMove()">◀</button>
                    <button class="btn btn-primary btn-sm" onclick="playPause()">▶ / ⏸</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="nextMove()">▶</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="goToEnd()">⏭</button>
                </div>
                <!-- 进度条 -->
                <div class="progress-bar-wrapper">
                    <input type="range" id="progressSlider" class="progress-slider" min="0" max="0" value="0">
                </div>
            </div>

            <!-- 右侧：详情 -->
            <div class="companion-panel">
                <div class="panel-header">
                    <h5>📊 对局信息</h5>
                </div>
                <div id="gameDetails" class="game-details">
                    <p class="text-muted">选择对局查看详情</p>
                </div>
                
                <div class="panel-header mt-3">
                    <h5>💡 AI 点评</h5>
                </div>
                <div id="aiCommentary" class="ai-commentary">
                    <p class="text-muted">选择对局后显示 AI 点评</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/go-board.js"></script>
    <script src="/static/js/records.js"></script>
</body>
</html>
