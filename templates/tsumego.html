{% extends "base.html" %}

{% block title %}死活题练习 - Go Learning{% endblock %}

{% block content %}
<div class="tsumego-page">
    <!-- 题目列表侧边栏 -->
    <aside class="tsumego-sidebar">
        <div class="panel filter-panel">
            <h3>🔍 筛选题目</h3>
            <div class="filter-group">
                <label>分类</label>
                <div class="filter-options">
                    <label class="checkbox-label">
                        <input type="checkbox" value="capture" checked>
                        <span>🎯 吃子题</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="life" checked>
                        <span>💚 做活题</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="kill" checked>
                        <span>⚔️ 对杀题</span>
                    </label>
                </div>
            </div>
            <div class="filter-group">
                <label>难度</label>
                <div class="filter-options">
                    <label class="checkbox-label">
                        <input type="checkbox" value="beginner" checked>
                        <span>🌱 入门</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="elementary" checked>
                        <span>🌿 初级</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="intermediate" checked>
                        <span>🌳 中级</span>
                    </label>
                </div>
            </div>
            <button class="btn btn-secondary btn-block" id="reset-filters">
                重置筛选
            </button>
        </div>

        <div class="panel stats-panel">
            <h3>📊 学习统计</h3>
            <div class="stat-item">
                <span class="stat-label">已完成</span>
                <span class="stat-value" id="completed-count">0/50</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">正确率</span>
                <span class="stat-value" id="accuracy-rate">0%</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">当前连对</span>
                <span class="stat-value" id="current-streak">0</span>
            </div>
        </div>

        <div class="panel problem-list-panel">
            <h3>📋 题目列表</h3>
            <div class="problem-list" id="problem-list">
                <!-- 动态生成 -->
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <div class="tsumego-main">
        <!-- 题目信息栏 -->
        <div class="problem-header">
            <div class="problem-info">
                <span class="problem-number" id="problem-number">#1</span>
                <span class="problem-title" id="problem-title">一线吃子</span>
                <span class="problem-tags">
                    <span class="tag tag-category" id="problem-category">吃子题</span>
                    <span class="tag tag-difficulty" id="problem-difficulty">入门</span>
                </span>
            </div>
            <div class="problem-actions">
                <button class="btn btn-icon" id="btn-prev" title="上一题">
                    <span>⬅️</span>
                </button>
                <button class="btn btn-icon" id="btn-next" title="下一题">
                    <span>➡️</span>
                </button>
                <button class="btn btn-icon" id="btn-random" title="随机题目">
                    <span>🎲</span>
                </button>
            </div>
        </div>

        <!-- 棋盘区域 -->
        <div class="problem-board-area">
            <div class="board-wrapper">
                <div id="tsumego-board" class="go-board tsumego-board"></div>
            </div>

            <!-- 题目信息卡片 -->
            <div class="problem-card">
                <div class="problem-description">
                    <h4>题目描述</h4>
                    <p id="problem-desc">白棋在一线，黑棋如何吃掉它？</p>
                </div>
                <div class="hint-section">
                    <div class="hint-header">
                        <h4>💡 提示系统</h4>
                        <span class="hint-count">剩余: <span id="hints-remaining">3</span>/3</span>
                    </div>
                    <div class="hint-content" id="hint-content">
                        <p class="hint-placeholder">点击获取提示（最多3次）</p>
                    </div>
                    <button class="btn btn-hint" id="btn-hint" {% if false %}disabled{% endif %}>
                        <span>💡</span> 获取提示
                    </button>
                </div>
            </div>
        </div>

        <!-- 反馈区域 -->
        <div class="feedback-area" id="feedback-area">
            <div class="feedback-content" id="feedback-content">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 控制栏 -->
        <div class="problem-controls">
            <button class="btn btn-secondary" id="btn-reset-problem">
                <span>🔄</span> 重置
            </button>
            <button class="btn btn-secondary" id="btn-show-answer">
                <span>👁️</span> 显示答案
            </button>
            <button class="btn btn-primary" id="btn-submit">
                <span>✓</span> 提交答案
            </button>
        </div>
    </div>
</div>

<!-- 答案解析弹窗 -->
<div class="modal" id="solution-modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3>📖 答案解析</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <div class="solution-board-wrapper">
                <div id="solution-board" class="go-board solution-board"></div>
            </div>
            <div class="solution-explanation">
                <h4>解析</h4>
                <p id="solution-text"></p>
                <div class="solution-moves">
                    <h4>正解</h4>
                    <div id="solution-moves-list"></div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="close-solution">关闭</button>
            <button class="btn btn-primary" id="next-after-solution">下一题</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static_files', filename='js/go-board.js') }}"></script>
<script src="{{ url_for('static_files', filename='js/tsumego.js') }}"></script>
{% endblock %}
