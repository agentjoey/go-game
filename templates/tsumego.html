<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>死活题 - 围棋学堂</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航 -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">⚪ 围棋学堂</a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/play">对弈</a>
                <a href="/tsumego" class="active">死活题</a>
                <a href="/tutorial">教程</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="page-header">
            <h1>🧩 死活题练习</h1>
            <p class="text-muted">提高计算力，从每一道题开始</p>
        </div>

        <div class="game-layout">
            <!-- 左侧：题目列表 -->
            <div class="moves-panel">
                <div class="panel-header">
                    <h5>📚 题目列表</h5>
                </div>
                <!-- 筛选 -->
                <div class="filter-section">
                    <select id="puzzleType" class="form-select form-select-sm">
                        <option value="all">全部类型</option>
                        <option value="kill">吃子题</option>
                        <option value="live">做活题</option>
                        <option value="capture">对杀题</option>
                    </select>
                    <select id="puzzleDifficulty" class="form-select form-select-sm">
                        <option value="all">全部难度</option>
                        <option value="easy">入门</option>
                        <option value="medium">初级</option>
                        <option value="hard">中级</option>
                    </select>
                </div>
                <div id="puzzleList" class="moves-list">
                    <!-- 题目列表由 JS 渲染 -->
                </div>
            </div>

            <!-- 中间：棋盘 -->
            <div class="board-area">
                <div class="board-info">
                    <span class="current-player">
                        <span id="puzzleTitle">选择一个题目开始</span>
                    </span>
                    <span class="captures">
                        剩余提示: <span id="hintsLeft" class="capture-count">3</span>
                    </span>
                </div>
                <div class="board-wrapper">
                    <div id="tsumego-board" class="go-board"></div>
                </div>
                <div class="board-controls">
                    <button class="btn btn-outline-secondary btn-sm" onclick="resetPuzzle()">🔄 重置</button>
                    <button class="btn btn-primary btn-sm" onclick="showHint()">💡 提示</button>
                    <button class="btn btn-outline-success btn-sm" onclick="nextPuzzle()">下一题 →</button>
                </div>
            </div>

            <!-- 右侧：统计 + AI 反馈 -->
            <div class="companion-panel">
                <div class="panel-header">
                    <h5>🐼 AI 教练</h5>
                </div>
                <!-- AI 气泡 -->
                <div class="ai-bubble" id="ai-bubble"></div>
                
                <div class="panel-header mt-3">
                    <h5>📊 练习统计</h5>
                </div>
                <div class="stats-card">
                    <div class="stat-item">
                        <span class="stat-value" id="completedCount">0</span>
                        <span class="stat-label">已完成</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value text-success" id="correctCount">0</span>
                        <span class="stat-label">正确</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="accuracyRate">0%</span>
                        <span class="stat-label">正确率</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value text-gold" id="streakCount">0</span>
                        <span class="stat-label">连续正确</span>
                    </div>
                </div>
                <div class="puzzle-desc" id="puzzleDesc">
                    <p>选择一个题目开始练习</p>
                </div>
                <div class="hint-section">
                    <h6>题目类型说明</h6>
                    <ul>
                        <li><strong>吃子题</strong>：吃掉对方的棋子</li>
                        <li><strong>做活题</strong>：让自己的棋活起来</li>
                        <li><strong>对杀题</strong>：比谁先吃掉对方</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/go-board.js"></script>
    <script src="/static/js/ai-companion.js"></script>
    <script src="/static/js/tsumego.js"></script>
</body>
</html>
