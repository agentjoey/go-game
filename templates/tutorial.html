<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋教程 - 围棋学堂</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航 -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">⚪ 围棋学堂</a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/play">对弈</a>
                <a href="/tsumego">死活题</a>
                <a href="/tutorial" class="active">教程</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="page-header">
            <h1>📚 围棋教程</h1>
            <p class="text-muted">从零开始，学习围棋基础知识</p>
        </div>

        <div class="game-layout">
            <!-- 左侧：章节列表 -->
            <div class="moves-panel">
                <div class="panel-header">
                    <h5>📖 课程目录</h5>
                </div>
                <div id="chapterList" class="moves-list">
                    <!-- 章节列表由 JS 渲染 -->
                </div>
                <div class="progress-section">
                    <div class="progress-label">学习进度</div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <div class="progress-text" id="progressText">0 / 8 章节</div>
                </div>
            </div>

            <!-- 中间：教程内容 -->
            <div class="board-area tutorial-content-area">
                <div id="tutorialContent" class="tutorial-content">
                    <div class="tutorial-welcome">
                        <div class="welcome-icon">🐼</div>
                        <h2>欢迎学习围棋</h2>
                        <p>选择一个章节开始你的围棋之旅</p>
                        <div class="welcome-tips">
                            <div class="tip-item">
                                <span class="tip-icon">💡</span>
                                <span>每章都配有练习题</span>
                            </div>
                            <div class="tip-item">
                                <span class="tip-icon">🎮</span>
                                <span>可以实际动手操作</span>
                            </div>
                            <div class="tip-item">
                                <span class="tip-icon">📈</span>
                                <span>完成后解锁下一章</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 练习棋盘 (隐藏) -->
                <div id="exerciseArea" class="exercise-area" style="display: none;">
                    <div class="board-wrapper">
                        <div id="exercise-board" class="go-board"></div>
                    </div>
                    <div class="exercise-instructions" id="exerciseInstructions">
                        <p>按照指示完成练习</p>
                    </div>
                    <div class="board-controls">
                        <button class="btn btn-outline-secondary btn-sm" onclick="resetExercise()">🔄 重置</button>
                        <button class="btn btn-primary btn-sm" onclick="checkExercise()">✓ 提交答案</button>
                    </div>
                </div>
            </div>

            <!-- 右侧：学习辅助 -->
            <div class="companion-panel">
                <div class="panel-header">
                    <h5>🎯 学习目标</h5>
                </div>
                <div id="learningObjectives" class="objectives-list">
                    <p class="text-muted">选择章节查看目标</p>
                </div>
                
                <div class="panel-header mt-3">
                    <h5>🐼 学习伙伴</h5>
                </div>
                <div class="study-companion">
                    <div class="companion-mini">
                        <span class="companion-emoji">🐼</span>
                        <div class="companion-speech">
                            <p>"围棋是一门艺术，慢慢来~"</p>
                        </div>
                    </div>
                </div>
                
                <div class="panel-header mt-3">
                    <h5>🏆 成就</h5>
                </div>
                <div id="achievements" class="achievements-list">
                    <div class="achievement-item locked">
                        <span class="achievement-icon">🌱</span>
                        <span>初出茅庐</span>
                    </div>
                    <div class="achievement-item locked">
                        <span class="achievement-icon">👶</span>
                        <span>围棋入门</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/go-board.js"></script>
    <script src="/static/js/tutorial.js"></script>
</body>
</html>
