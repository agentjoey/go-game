<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对局复盘 - 围棋学堂</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .review-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .review-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }
        
        .review-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }
        
        @media (max-width: 900px) {
            .review-layout {
                grid-template-columns: 1fr;
            }
        }
        
        /* 棋盘区域 */
        .review-board-area {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .review-board-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* 播放控制 */
        .playback-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 20px 0;
        }
        
        .playback-controls button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--cinnabar-red);
            background: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .playback-controls button:hover {
            background: var(--cinnabar-red);
            color: white;
        }
        
        .playback-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .playback-slider {
            flex: 1;
            max-width: 400px;
        }
        
        .playback-slider input[type="range"] {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #e0e0e0;
            border-radius: 4px;
            outline: none;
        }
        
        .playback-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--cinnabar-red);
            cursor: pointer;
        }
        
        .move-counter {
            font-weight: 600;
            color: var(--mist-gray);
            min-width: 80px;
            text-align: center;
        }
        
        /* 精彩时刻 */
        .highlights-section {
            margin-top: 24px;
        }
        
        .highlights-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .highlight-cards {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .highlight-card {
            flex: 0 0 auto;
            width: 140px;
            background: var(--rice-paper);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .highlight-card:hover {
            border-color: var(--cinnabar-red);
            transform: translateY(-2px);
        }
        
        .highlight-card .move-num {
            font-size: 0.75rem;
            color: var(--mist-gray);
            margin-bottom: 4px;
        }
        
        .highlight-card .move-type {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .highlight-card .move-type.brilliant { color: var(--bamboo-green); }
        .highlight-card .move-type.turning { color: var(--cinnabar-red); }
        .highlight-card .move-type.key { color: #d4a03d; }
        
        .highlight-card .play-btn {
            width: 100%;
            padding: 6px;
            background: var(--cinnabar-red);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        
        /* 右侧面板 */
        .review-sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .stats-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .stats-card h3 {
            font-size: 1rem;
            font-weight: 700;
            margin: 0 0 16px 0;
        }
        
        /* 胜率图表 */
        .winrate-chart {
            height: 120px;
            background: linear-gradient(180deg, rgba(90,122,156,0.1) 0%, transparent 100%);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .winrate-line {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
        }
        
        .winrate-svg {
            width: 100%;
            height: 100%;
        }
        
        /* 统计数据 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        
        .stat-box {
            background: var(--rice-paper);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-box .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cinnabar-red);
        }
        
        .stat-box .label {
            font-size: 0.8rem;
            color: var(--mist-gray);
        }
        
        /* AI 点评 */
        .ai-review {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .ai-review-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .ai-review-avatar {
            width: 40px;
            height: 40px;
            background: var(--rice-paper);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .ai-review-content {
            background: var(--rice-paper);
            border-radius: 12px;
            padding: 16px;
            line-height: 1.6;
        }
        
        /* 完成任务 */
        .task-complete-card {
            background: linear-gradient(135deg, #ff9a56, #ff6b6b);
            border-radius: 16px;
            padding: 20px;
            color: white;
            box-shadow: 0 4px 20px rgba(255,107,107,0.3);
        }
        
        .task-complete-card h3 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
        }
        
        .task-complete-card .streak-info {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        /* 操作按钮 */
        .review-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .review-actions .btn {
            flex: 1;
            min-width: 120px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">⚪ 围棋学堂</a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/play">对弈</a>
                <a href="/tsumego">死活题</a>
                <a href="/tutorial">教程</a>
            </div>
        </div>
    </nav>
    
    <main class="review-page">
        <div class="review-header">
            <h1>📝 对局复盘</h1>
            <div>
                <button class="btn btn-outline-secondary btn-sm" onclick="shareReview()">📤 分享</button>
            </div>
        </div>
        
        <div class="review-layout">
            <!-- 左侧：棋盘回放 -->
            <div class="review-board-area">
                <div class="review-board-wrapper">
                    <div id="review-board" class="go-board" style="max-width: 500px;"></div>
                </div>
                
                <!-- 播放控制 -->
                <div class="playback-controls">
                    <button onclick="jumpToStart()" title="开头">⏮</button>
                    <button onclick="stepBack()" title="上一步">◀</button>
                    <button onclick="togglePlayback()" id="playBtn" title="播放/暂停">▶</button>
                    <button onclick="stepForward()" title="下一步">▶</button>
                    <button onclick="jumpToEnd()" title="结尾">⏭</button>
                    <span class="move-counter"><span id="currentMoveNum">0</span> / <span id="totalMoves">0</span></span>
                </div>
                
                <div class="playback-slider">
                    <input type="range" id="moveSlider" min="0" max="0" value="0" oninput="seekTo(this.value)">
                </div>
                
                <!-- 精彩时刻 -->
                <div class="highlights-section">
                    <div class="highlights-title">🎬 精彩时刻</div>
                    <div class="highlight-cards" id="highlightCards">
                        <!-- JS 渲染 -->
                    </div>
                </div>
            </div>
            
            <!-- 右侧：数据面板 -->
            <div class="review-sidebar">
                <!-- 对局数据 -->
                <div class="stats-card">
                    <h3>📊 本局数据</h3>
                    <div class="winrate-chart">
                        <div class="winrate-line">
                            <svg class="winrate-svg" viewBox="0 0 300 100" preserveAspectRatio="none">
                                <defs>
                                    <linearGradient id="winrateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                        <stop offset="0%" style="stop-color:#5a7a9c;stop-opacity:0.3" />
                                        <stop offset="100%" style="stop-color:#5a7a9c;stop-opacity:0" />
                                    </linearGradient>
                                </defs>
                                <path id="winrateArea" fill="url(#winrateGrad)"></path>
                                <path id="winratePath" fill="none" stroke="#5a7a9c" stroke-width="2"></path>
                            </svg>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="value" id="brilliantCount">0</div>
                            <div class="label">妙手</div>
                        </div>
                        <div class="stat-box">
                            <div class="value" id="mistakeCount">0</div>
                            <div class="label">失误</div>
                        </div>
                        <div class="stat-box">
                            <div class="value" id="maxLead">0</div>
                            <div class="label">最大领先</div>
                        </div>
                        <div class="stat-box">
                            <div class="value" id="turningPoint">-</div>
                            <div class="label">转折点</div>
                        </div>
                    </div>
                </div>
                
                <!-- AI 点评 -->
                <div class="ai-review">
                    <div class="ai-review-header">
                        <div class="ai-review-avatar" id="reviewAiAvatar">🐼</div>
                        <div>
                            <div id="reviewAiName">阿呆</div>
                            <div style="font-size: 0.8rem; color: var(--mist-gray);">AI 点评</div>
                        </div>
                    </div>
                    <div class="ai-review-content" id="aiReviewContent">
                        这盘棋前半盘很胶着，第67手的断是胜负手。最后的官子还可以再精确一点，建议练习一下官子题~
                    </div>
                </div>
                
                <!-- 任务完成 -->
                <div class="task-complete-card" id="taskCompleteCard">
                    <h3>🎯 今日任务完成!</h3>
                    <div style="font-size: 1.5rem; font-weight: 700; margin: 8px 0;">+50 经验</div>
                    <div class="streak-info" id="streakInfo">🔥 连胜 6 天！再坚持1天解锁新皮肤</div>
                </div>
                
                <!-- 操作按钮 -->
                <div class="review-actions">
                    <a href="/play" class="btn btn-primary">🔄 再来一盘</a>
                    <a href="/tsumego" class="btn btn-outline-secondary">📚 学习建议</a>
                </div>
            </div>
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/go-board.js"></script>
    <script src="/static/js/review.js"></script>
</body>
</html>
