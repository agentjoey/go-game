<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对弈 - 围棋学堂</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航 -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">⚪ 围棋学堂</a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/play" class="active">对弈</a>
                <a href="/tsumego">死活题</a>
                <a href="/tutorial">教程</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="game-layout">
            <!-- AI 棋伴区域 -->
            <div class="companion-panel">
                <div class="companion-card">
                    <div class="companion-avatar" id="ai-emoji">🐼</div>
                    <div class="companion-info">
                        <span class="companion-name" id="ai-name">阿呆</span>
                        <span class="companion-status">AI 对手</span>
                    </div>
                </div>
                <!-- AI 气泡 -->
                <div class="ai-bubble" id="ai-bubble"></div>
                <!-- AI 设置 -->
                <div class="ai-settings">
                    <div class="setting-item">
                        <label>棋伴性格</label>
                        <select id="companionType" class="form-select form-select-sm">
                            <option value="adai">🐼 阿呆 - 温和鼓励型</option>
                            <option value="xiaozhi">🦊 小智 - 挑战型</option>
                            <option value="youyou">🐱 悠悠 - 冷静型</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>棋盘大小</label>
                        <select id="boardSize" class="form-select form-select-sm">
                            <option value="19">19路 (标准)</option>
                            <option value="13">13路</option>
                            <option value="9">9路 (入门)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>AI 难度</label>
                        <select id="aiDifficulty" class="form-select form-select-sm">
                            <option value="none">人人对战</option>
                            <option value="easy">简单</option>
                            <option value="medium" selected>中等</option>
                            <option value="hard">困难</option>
                        </select>
                    </div>
                    <button class="btn btn-primary btn-sm w-100 mt-2" onclick="newGame()">开始新游戏</button>
                </div>
            </div>

            <!-- 棋盘区域 -->
            <div class="board-area">
                <div class="board-info">
                    <span class="current-player">
                        <span id="currentStone" class="stone-icon">⚫</span>
                        <span id="currentPlayer">黑方回合</span>
                    </span>
                    <span class="captures">
                        黑: <span id="blackCaptures" class="capture-count">0</span>
                        白: <span id="whiteCaptures" class="capture-count">0</span>
                    </span>
                </div>
                <div class="board-wrapper">
                    <div id="go-board" class="go-board"></div>
                </div>
                <div class="board-controls">
                    <button class="btn btn-outline-secondary btn-sm" onclick="undo()">↩️ 悔棋</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="passTurn()">Pass</button>
                    <button class="btn btn-outline-danger btn-sm" onclick="resign()">认输</button>
                </div>
            </div>

            <!-- 棋谱区域 -->
            <div class="moves-panel">
                <div class="panel-header">
                    <h5>📖 落子记录</h5>
                </div>
                <div id="moves-list" class="moves-list">
                    <p class="empty-moves">暂无落子</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/go-board.js"></script>
    <script src="/static/js/ai-companion.js"></script>
    <script src="/static/js/go-game.js"></script>
</body>
</html>
