<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对弈 - 围棋学堂</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="simple-nav">
        <a class="back-btn" href="/">← 返回</a>
    </nav>

    <main class="game-container">
        <!-- 左侧：棋盘 -->
        <div class="board-section">
            <div class="board-info">
                <span>当前回合：<strong id="current-player">黑方</strong></span>
                <span>黑方提子：<span id="black-captures">0</span></span>
                <span>白方提子：<span id="white-captures">0</span></span>
            </div>
            <div class="board-wrapper">
                <div id="go-board" class="go-board"></div>
            </div>
            <div class="board-controls">
                <button class="btn-action btn-undo" onclick="undoMove()">悔棋</button>
                <button class="btn-action btn-pass" onclick="passMove()">应手</button>
                <button class="btn-action btn-resign" onclick="resignGame()">认输</button>
            </div>
        </div>

        <!-- 右侧：AI面板 + 设置 -->
        <div class="sidebar-section">
            <div class="panel ai-panel">
                <div class="panel-header">
                    <span class="panel-icon">🐼</span>
                    <span class="panel-title">阿呆</span>
                </div>
                <div class="panel-body">
                    <p class="ai-status">状态：<span id="ai-status">空闲</span></p>
                    <button class="btn-new-game" onclick="newGame()">开始新游戏</button>
                </div>
            </div>
            <div class="panel settings-panel">
                <div class="panel-header">
                    <span class="panel-title">⚙️ 设置</span>
                </div>
                <div class="panel-body">
                    <p>棋盘大小：<select id="board-size"><option value="9">9路</option><option value="13">13路</option><option value="19" selected>19路</option></select></p>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/go-board.js"></script>
    <script src="/static/js/go-game.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.game = new GoGame();
        });
    </script>
</body>
</html>
