<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对弈 - 围棋学堂</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="game-top-nav">
        <a class="back-btn" href="/">← 返回</a>
        <div class="nav-icons">
            <button class="icon-btn" title="设置">⚙️</button>
            <button class="icon-btn" title="语音">🔊</button>
            <button class="icon-btn" title="统计">📊</button>
        </div>
    </nav>

    <main class="container py-3">
        <div class="game-layout-new">
            <!-- AI 状态面板 - 位于棋盘上方 -->
            <div class="ai-status-panel">
                <div class="player-card ai-card">
                    <div class="player-avatar" id="ai-avatar" style="background: #e3f2fd;">
                        <span id="ai-emoji">🐼</span>
                    </div>
                    <div class="player-info">
                        <span class="player-name" id="ai-name">阿呆</span>
                        <span class="player-status" id="ai-status">思考中... ⏳</span>
                    </div>
                </div>
                <div class="ai-bubble-area" id="ai-bubble-area">
                    <div class="ai-bubble-text" id="ai-bubble">这手棋...让我想想...</div>
                </div>
            </div>

            <!-- 棋盘区域 -->
            <div class="board-area">
                <!-- 费曼模式提示条 -->
                <div class="feynman-banner" id="feynmanBanner" style="display: none;">
                    <span class="feynman-icon">⚡</span>
                    <span class="feynman-text" id="feynmanText">费曼模式 - 找出AI的错误！</span>
                    <span class="feynman-timer" id="feynmanTimer"></span>
                </div>
                
                <div class="board-info">
                    <span class="current-player">
                        <span id="currentStone" class="stone-icon">⚫</span>
                        <span id="currentPlayer">黑方回合</span>
                    </span>
                    <span class="captures">
                        黑: <span id="blackCaptures" class="capture-count">0</span>
                        白: <span id="whiteCaptures" class="capture-count">0</span>
                    </span>
                </div>
                <div class="board-wrapper" id="boardWrapper">
                    <div class="board-wood-frame">
                        <div id="go-board" class="go-board"></div>
                    </div>
                </div>
                
                <!-- 用户状态面板 - 位于棋盘下方 -->
                <div class="user-status-panel">
                    <div class="player-card user-card">
                        <div class="player-avatar" style="background: #e3f2fd;">
                            <span>🧑</span>
                        </div>
                        <div class="player-info">
                            <span class="player-name">小明 <span class="you-tag">(你)</span></span>
                            <span class="game-timer" id="game-timer">已用: 00:00</span>
                        </div>
                    </div>
                    <button class="icon-btn stats-btn" title="统计" style="background: #fff3e0;">📊</button>
                </div>

                <div class="board-controls" id="boardControls">
                    <button class="btn-action btn-undo" onclick="undo()">↩️ 悔棋</button>
                    <button class="btn-action btn-resign" onclick="resign()">认输</button>
                    <button class="btn-action btn-help" onclick="triggerSocraticMode()">💡 求助</button>
                    <button class="btn-action btn-pass" onclick="passTurn()">Pass</button>
                </div>
                <!-- 费曼模式操作按钮 -->
                <div class="feynman-actions" id="feynmanActions" style="display: none;">
                    <button class="btn btn-outline-primary btn-sm" onclick="feynmanHint()">💡 提示</button>
                    <button class="btn btn-primary btn-sm" onclick="feynmanMarkBetter()">🎯 我认为这里更好</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="feynmanSkip()">⏭️ 跳过</button>
                </div>
                <!-- 苏格拉底模式 -->
                <div class="socratic-panel" id="socraticPanel" style="display: none;">
                    <div class="socratic-header">
                        <span class="socratic-icon">🔍</span>
                        <span class="socratic-title" id="socraticTitle">苏格拉底模式 - 一起思考...</span>
                    </div>
                    <div class="socratic-question" id="socraticQuestion"></div>
                    <div class="socratic-options" id="socraticOptions"></div>
                    <div class="socratic-actions">
                        <button class="btn btn-outline-secondary btn-sm" onclick="socraticSkip()">⏭️ 跳过</button>
                        <button class="btn btn-outline-primary btn-sm" onclick="socraticVoiceInput()">🎤 语音回答</button>
                    </div>
                </div>
            </div>

            <!-- AI 设置面板 - 移到右侧 -->
            <div class="settings-panel">
                <div class="panel-section">
                    <h6 class="section-title">🤖 AI 棋伴</h6>
                    <select id="companionType" class="form-select form-select-sm" onchange="updateCompanionUI()">
                        <option value="adai">🐼 阿呆 - 温和鼓励型</option>
                        <option value="xiaozhi">🦊 小智 - 挑战型</option>
                        <option value="youyou">🐱 悠悠 - 冷静型</option>
                    </select>
                </div>
                <div class="panel-section">
                    <h6 class="section-title">📐 棋盘设置</h6>
                    <select id="boardSize" class="form-select form-select-sm">
                        <option value="19">19路 (标准)</option>
                        <option value="13">13路</option>
                        <option value="9">9路 (入门)</option>
                    </select>
                </div>
                <div class="panel-section">
                    <h6 class="section-title">⚔️ 对战设置</h6>
                    <select id="aiDifficulty" class="form-select form-select-sm">
                        <option value="none">人人对战</option>
                        <option value="easy">简单</option>
                        <option value="medium" selected>中等</option>
                        <option value="hard">困难</option>
                    </select>
                </div>
                <button class="btn btn-primary w-100 mt-3" onclick="newGame()">开始新游戏</button>

                <!-- 棋谱区域 -->
                <div class="moves-panel mt-4">
                    <div class="panel-header">
                        <h6>📖 落子记录</h6>
                    </div>
                    <div id="moves-list" class="moves-list">
                        <p class="empty-moves">暂无落子</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/go-board.js"></script>
    <script src="/static/js/ai-companion.js"></script>
    <script src="/static/js/go-game.js"></script>
</body>
</html>
